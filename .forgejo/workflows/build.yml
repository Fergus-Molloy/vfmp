name: Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: https://data.forgejo.org/actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          unformatted="$(gofmt -l -e .)"
          if [ -n "$unformatted" ]; then
            echo "The following files have not been formatted:"
            echo "$unformatted"
            exit 1
          fi
      - name: golangci-lint
        uses: https://github.com/golangci/golangci-lint-action@v9
        with:
          version: v2.8

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: https://data.forgejo.org/actions/setup-go@v6
        with:
          go-version-file: go.mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Build
        run: go build -o vfmp ./cmd/vfmp/main.go

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: https://data.forgejo.org/actions/setup-go@v6
        with:
          go-version-file: go.mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Run unit tests
        run: go run gotest.tools/gotestsum@latest --format=testname ./internal/...

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: https://data.forgejo.org/actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run integration tests
        run: |
          go build -o vfmp ./cmd/vfmp/main.go
          ./vfmp -config "config.test.yml" > vfmp.log 2>&1 &
          sleep 1
          go run gotest.tools/gotestsum@latest --format=testname ./tests/... -config "../config.test.yml"
      - uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: vfmp.log
          path: vfmp.log

  tag:
    runs-on: ubuntu-latest
    needs:
      - lint
      - build
      - unit
      - integration
    steps:
      - uses: actions/checkout@v6
      - name: Tag Commit
        run: |
          git tag -f dev ${{ github.sha }}
          git push origin dev --force

