on: 
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:

env:
  REGISTRY: git.molloy.xyz
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: https://data.forgejo.org/actions/setup-go@v6
        with:
          go-version: stable
      - name: golangci-lint
        uses: https://github.com/golangci/golangci-lint-action@v9
        with:
          version: v2.8

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: https://data.forgejo.org/actions/setup-go@v6
        with:
          go-version: stable
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Build
        run: go build -o vfmp

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: https://data.forgejo.org/actions/setup-go@v6
        with:
          go-version: stable
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Run unit tests
        run: go run gotest.tools/gotestsum@latest --format=testname ./internal/...

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: https://data.forgejo.org/actions/setup-go@v6
        with:
          go-version: stable
      - uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Run integration tests
        run: |
          go run main.go -config "config.test.yml" > vfmp.log 2>&1 &
          sleep 1
          go run gotest.tools/gotestsum@latest --format=testname ./tests/... -config "../config.test.yml"
      - uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: vfmp.log
          path: vfmp.log

  build-and-push-image:
    runs-on: ubuntu-latest
    needs:
      - lint
      - build
      - unit
      - integration
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/metadata-action@v4
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: "VERSION=${{ forgejo.ref_name }}"
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
