on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - dev
          - prod

env:
  REGISTRY: git.molloy.xyz
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: https://data.forgejo.org/actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: https://github.com/golangci/golangci-lint-action@v9
        with:
          version: v2.8

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: https://data.forgejo.org/actions/setup-go@v6
        with:
          go-version-file: go.mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Build
        run: go build -o vfmp ./cmd/vfmp/main.go

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: https://data.forgejo.org/actions/setup-go@v6
        with:
          go-version-file: go.mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Run unit tests
        run: go run gotest.tools/gotestsum@latest --format=testname ./internal/...

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: https://data.forgejo.org/actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run integration tests
        run: |
          go run ./cmd/vfmp/main.go -config "config.test.yml" > vfmp.log 2>&1 &
          sleep 1
          go run gotest.tools/gotestsum@latest --format=testname ./tests/... -config "../config.test.yml"
      - uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: vfmp.log
          path: vfmp.log

  build-and-push-image:
    runs-on: ubuntu-latest
    needs:
      - lint
      - build
      - unit
      - integration
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/metadata-action@v4
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Calculate version
        id: version
        run: |
          VERSION="$(git describe --match='v[0-9].[0-9].[0-9]' --tags "$FORGEJO_REF" || true)"
          echo "$VERSION"
          echo "version=$VERSION" >> $FORGEJO_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          build-args: "VERSION=${{ steps.version.outputs.version }}"
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: [build-and-push-image]
    steps:
      - uses: actions/checkout@v6

      - name: Install kubectl
        uses: https://github.com/Azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -k deploy/k8s/overlays/${{ inputs.environment }}
          kubectl rollout status deployment/vfmp -n ${{ inputs.environment }} --timeout=5m
